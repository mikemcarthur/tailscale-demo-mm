# Tailscale Kubernetes Operator values.
#
# The operator authenticates with OAuth credentials stored in the operator-oauth
# Secret (created by Terraform). The operator is installed for tailnet credential
# management and could be used for Service-exposure annotations, but this demo
# uses Tailscale sidecar containers in each application Pod instead.

# The operator pod itself joins the tailnet with this hostname.
operatorConfig:
  hostname: "k8s-operator-demo"

# OAuth client credentials live in this pre-existing Secret.
oauth:
  existingSecret: "operator-oauth"

# Resource requests/limits. Operator is lightweight.
operator:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
