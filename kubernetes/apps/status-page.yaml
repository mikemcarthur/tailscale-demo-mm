# Serve config for the status-page sidecar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: status-page-serve-config
  namespace: tailscale-demo
data:
  serve-config.json: |
    {
      "TCP": {
        "443": {
          "HTTPS": true
        }
      },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": {
            "/": {
              "Proxy": "http://127.0.0.1:5000"
            }
          }
        }
      }
    }
---
# ServiceAccount used by both the status-page container (cluster reads)
# and the Tailscale sidecar (state Secret management).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: status-page
  namespace: tailscale-demo
---
# In-namespace permissions for the Tailscale sidecar.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: status-page-tailscale
  namespace: tailscale-demo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: status-page-tailscale
  namespace: tailscale-demo
subjects:
  - kind: ServiceAccount
    name: status-page
    namespace: tailscale-demo
roleRef:
  kind: Role
  name: status-page-tailscale
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped read permissions for the status-page app.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: status-page-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: status-page-reader
subjects:
  - kind: ServiceAccount
    name: status-page
    namespace: tailscale-demo
roleRef:
  kind: ClusterRole
  name: status-page-reader
  apiGroup: rbac.authorization.k8s.io
---
# The status-page application source.
apiVersion: v1
kind: ConfigMap
metadata:
  name: status-page-app
  namespace: tailscale-demo
data:
  app.py: |
    from flask import Flask, render_template_string
    from kubernetes import client, config
    from datetime import datetime, timezone
    
    app = Flask(__name__)
    config.load_incluster_config()
    v1 = client.CoreV1Api()
    
    TEMPLATE = """
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Internal Infrastructure Console</title>
      <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 1100px; margin: 30px auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
        h1 { color: #58a6ff; border-bottom: 2px solid #30363d; padding-bottom: 10px; }
        h2 { color: #58a6ff; margin-top: 30px; }
        .warning { background: #4a1e1e; border-left: 4px solid #f85149; padding: 12px 16px; margin: 20px 0; border-radius: 6px; }
        .warning strong { color: #f85149; }
        .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 20px 0; }
        .stat { background: #161b22; padding: 16px; border-radius: 8px; border: 1px solid #30363d; }
        .stat-label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 600; color: #58a6ff; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #161b22; border-radius: 8px; overflow: hidden; }
        th { background: #21262d; color: #c9d1d9; text-align: left; padding: 10px 14px; font-weight: 600; font-size: 13px; }
        td { padding: 10px 14px; border-top: 1px solid #30363d; font-size: 13px; }
        .ready { color: #3fb950; }
        .footer { color: #8b949e; font-size: 12px; margin-top: 30px; text-align: center; }
      </style>
    </head>
    <body>
      <h1>Internal Infrastructure Console</h1>
      <div class="warning"><strong>ADMIN ACCESS ONLY.</strong> This page exposes privileged cluster information. Access is restricted to identities tagged group:admin in the Tailscale policy.</div>

      <h2>Cluster Summary</h2>
      <div class="summary">
        <div class="stat"><div class="stat-label">Kubernetes</div><div class="stat-value">{{ k8s_version }}</div></div>
        <div class="stat"><div class="stat-label">Nodes</div><div class="stat-value">{{ node_count }}</div></div>
        <div class="stat"><div class="stat-label">Pods Running</div><div class="stat-value">{{ pod_count }}</div></div>
        <div class="stat"><div class="stat-label">Namespaces</div><div class="stat-value">{{ ns_count }}</div></div>
      </div>

      <h2>Nodes</h2>
      <table>
        <thead><tr><th>Name</th><th>Status</th><th>Role</th><th>Kernel</th><th>Age</th></tr></thead>
        <tbody>
        {% for n in nodes %}
          <tr><td>{{ n.name }}</td><td class="ready">{{ n.status }}</td><td>{{ n.role }}</td><td>{{ n.kernel }}</td><td>{{ n.age }}</td></tr>
        {% endfor %}
        </tbody>
      </table>

      <div class="footer">Served at {{ now }} from {{ hostname }} via Tailscale. Identity-gated by Grants policy.</div>
    </body>
    </html>
    """
    
    def age(ts):
        if not ts: return "-"
        delta = datetime.now(timezone.utc) - ts
        days = delta.days
        hours = (delta.seconds // 3600)
        if days > 0: return f"{days}d"
        return f"{hours}h"
    
    @app.route("/")
    def index():
        nodes_raw = v1.list_node().items
        pods_raw = v1.list_pod_for_all_namespaces(field_selector="status.phase=Running").items
        ns_raw = v1.list_namespace().items
        
        nodes = []
        k8s_version = ""
        for n in nodes_raw:
            status = "Ready" if any(c.status == "True" and c.type == "Ready" for c in n.status.conditions) else "NotReady"
            role = "control-plane" if any(l.startswith("node-role.kubernetes.io/control-plane") for l in (n.metadata.labels or {})) else "worker"
            nodes.append({
                "name": n.metadata.name,
                "status": status,
                "role": role,
                "kernel": n.status.node_info.kernel_version[:20],
                "age": age(n.metadata.creation_timestamp),
            })
            k8s_version = n.status.node_info.kubelet_version
        
        return render_template_string(
            TEMPLATE,
            k8s_version=k8s_version,
            node_count=len(nodes_raw),
            pod_count=len(pods_raw),
            ns_count=len(ns_raw),
            nodes=nodes,
            now=datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
            hostname="status-page (admin-only)",
        )
    
    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: tailscale-demo
  labels:
    app: status-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-page
  template:
    metadata:
      labels:
        app: status-page
    spec:
      serviceAccountName: status-page
      containers:
        - name: status-page
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet flask kubernetes && \
              python /app/app.py
          ports:
            - name: http
              containerPort: 5000
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

        - name: tailscale
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: status-page-tailscale-authkey
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: "status-page"
            - name: TS_KUBE_SECRET
              value: "status-page-tailscale-state"
            - name: TS_USERSPACE
              value: "true"
            - name: TS_ACCEPT_DNS
              value: "false"
            - name: TS_SERVE_CONFIG
              value: "/etc/tailscale/serve-config.json"
          volumeMounts:
            - name: serve-config
              mountPath: /etc/tailscale
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

      volumes:
        - name: app
          configMap:
            name: status-page-app
        - name: serve-config
          configMap:
            name: status-page-serve-config
