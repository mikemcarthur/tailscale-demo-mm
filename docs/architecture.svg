<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>tailscale-demo-mm architecture</title>
<desc>Two identities — admin and contractor — on a tailnet reach two services in Kubernetes, each running with a Tailscale sidecar. Access is gated by a Grants policy managed in Terraform.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.bg{fill:#fff}.t-blue{fill:#E6F1FB;stroke:#185FA5}.t-amber{fill:#FAEEDA;stroke:#BA7517}.t-gray{fill:#F1EFE8;stroke:#5F5E5A}.t-purple{fill:#EEEDFE;stroke:#534AB7}.t-teal{fill:#E1F5EE;stroke:#0F6E56}.t-pink{fill:#FBEAF0;stroke:#993556}.txt-blue{fill:#0C447C}.txt-amber{fill:#633806}.txt-gray{fill:#444441}.txt-purple{fill:#3C3489}.txt-teal{fill:#085041}.txt-pink{fill:#72243E}.th{font-family:sans-serif;font-size:14px;font-weight:500}.ts{font-family:sans-serif;font-size:12px;font-weight:400}.arr{stroke:#888;stroke-width:1.5;fill:none}
</style>
</defs>
<rect class="bg" width="100%" height="100%"/>
<text class="th txt-gray" x="340" y="32" text-anchor="middle">tailscale-demo-mm</text>
<text class="ts txt-gray" x="340" y="52" text-anchor="middle">Identity-based access to private Kubernetes services</text>
<rect class="t-blue" x="30" y="90" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th txt-blue" x="115" y="116" text-anchor="middle" dominant-baseline="central">admin-laptop</text>
<text class="ts txt-blue" x="115" y="136" text-anchor="middle" dominant-baseline="central">group:admin</text>
<rect class="t-amber" x="30" y="180" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th txt-amber" x="115" y="206" text-anchor="middle" dominant-baseline="central">contractor-laptop</text>
<text class="ts txt-amber" x="115" y="226" text-anchor="middle" dominant-baseline="central">group:contractor</text>
<rect class="t-gray" x="240" y="80" width="200" height="180" rx="12" stroke-width="0.5"/>
<text class="th txt-gray" x="340" y="106" text-anchor="middle" dominant-baseline="central">Tailnet</text>
<text class="ts txt-gray" x="340" y="132" text-anchor="middle" dominant-baseline="central">WireGuard mesh</text>
<text class="ts txt-gray" x="340" y="156" text-anchor="middle" dominant-baseline="central">Grants policy</text>
<text class="ts txt-gray" x="340" y="180" text-anchor="middle" dominant-baseline="central">MagicDNS</text>
<text class="ts txt-gray" x="340" y="204" text-anchor="middle" dominant-baseline="central">Google SSO</text>
<text class="ts txt-gray" x="340" y="234" text-anchor="middle" dominant-baseline="central">Coordination plane only</text>
<rect class="t-purple" x="480" y="80" width="170" height="180" rx="12" stroke-width="0.5"/>
<text class="th txt-purple" x="565" y="106" text-anchor="middle" dominant-baseline="central">Kubernetes cluster</text>
<text class="ts txt-purple" x="565" y="126" text-anchor="middle" dominant-baseline="central">tailscale-demo namespace</text>
<rect class="t-teal" x="498" y="146" width="134" height="46" rx="6" stroke-width="0.5"/>
<text class="th txt-teal" x="565" y="164" text-anchor="middle" dominant-baseline="central">it-tools</text>
<text class="ts txt-teal" x="565" y="182" text-anchor="middle" dominant-baseline="central">tag:app-public</text>
<rect class="t-pink" x="498" y="202" width="134" height="46" rx="6" stroke-width="0.5"/>
<text class="th txt-pink" x="565" y="220" text-anchor="middle" dominant-baseline="central">status-page</text>
<text class="ts txt-pink" x="565" y="238" text-anchor="middle" dominant-baseline="central">tag:app-admin</text>
<line x1="200" y1="122" x2="240" y2="160" class="arr" marker-end="url(#arrow)"/>
<line x1="200" y1="212" x2="240" y2="180" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="160" x2="498" y2="169" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="200" x2="498" y2="225" class="arr" marker-end="url(#arrow)"/>
<rect class="t-gray" x="30" y="320" width="620" height="100" rx="8" stroke-width="0.5"/>
<text class="th txt-gray" x="340" y="346" text-anchor="middle" dominant-baseline="central">Grants policy: who can reach what</text>
<text class="ts txt-gray" x="340" y="372" text-anchor="middle" dominant-baseline="central">admin can reach tag:app-public and tag:app-admin</text>
<text class="ts txt-gray" x="340" y="392" text-anchor="middle" dominant-baseline="central">contractor can reach tag:app-public only</text>
<text class="ts txt-gray" x="340" y="410" text-anchor="middle" dominant-baseline="central">policy lives in Terraform, change is a pull request</text>
<rect class="t-gray" x="30" y="450" width="620" height="64" rx="8" stroke-width="0.5"/>
<text class="th txt-gray" x="340" y="476" text-anchor="middle" dominant-baseline="central">Inside the cluster: each app runs with a Tailscale sidecar</text>
<text class="ts txt-gray" x="340" y="498" text-anchor="middle" dominant-baseline="central">Sidecar joins the tailnet, terminates TLS on :443, forwards to localhost</text>
</svg>
